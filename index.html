<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>市集庫存</title>
    <style>
        body{ font-family:Arial; max-width:900px; margin:auto; background:#fff8dc; color:#5a4a00; padding:20px; }
        h1{ text-align:center; color:#c79a00; }
        h2{ color:#a67c00; margin-top:30px; }
        .products{ display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
        .card{ background:white; border:1px solid #f0d97a; border-radius:12px; padding:15px; width:200px; text-align:center; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
        .card h3{ margin:10px 0; color:#5a3e2b; }
        .card p{ margin:5px 0; color:#8b5e3c; font-weight:bold; }
        .action-btn{ background:#ffd84d; border:none; padding:6px 10px; border-radius:6px; cursor:pointer; font-weight:bold; color:#5a4a00; margin:3px; }
        .action-btn:hover{ background:#ffcc00; }
        table{ border-collapse:collapse; width:100%; background:white; margin-top:10px; border-radius:12px; overflow:hidden; }
        td,th{ border:1px solid #f0d97a; padding:8px; text-align:center; }
        th{ background:#ffe680; }
        #topTotal{ font-size:1.4em; font-weight:bold; text-align:center; margin-bottom:20px; }
        .cart-item{ margin:5px 0; }
        /* 結帳區塊和 GIF 並排且同高 */
        .checkout-section {
            display: flex;
            align-items: stretch;
            gap: 20px;
        }
        .checkout-left {
            flex: 1;
            background:#fff8dc;
            padding:10px;
            border:1px solid #f0d97a;
            border-radius:8px;
        }
        .checkout-right {
            flex: 0 0 200px;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#fff8dc;
            border:1px solid #f0d97a;
            border-radius:8px;
        }
        .checkout-right img {
            max-width:100%;
            max-height:100%;
        }
    </style>
</head>
<body>

<div id="topTotal">今日營業額：<span id="total">0</span></div>

<h1>市集庫存</h1>

<h2>商品列表</h2>
<div class="products" id="productList"></div>

<h2>單筆待結帳數</h2>
<div class="checkout-section">
    <div class="checkout-left">
        <ul id="cart"></ul>
        <p>本次小計：<span id="cartTotal">0</span></p>
        <button class="action-btn" onclick="checkout()">確認結算</button>
    </div>
    <div class="checkout-right">
        <img src="https://i0.wp.com/media1.giphy.com/media/lpODa2TxxS2Cj2M8Ht/giphy.gif?w=640&ssl=1" alt="GIF">
    </div>
</div>

<h2>登記紀錄</h2>
<table id="records">
    <tr><th>時間</th><th>品項明細</th><th>小計</th></tr>
</table>

<button class="action-btn" onclick="clearData()">刪除今日所有數據</button>

<script>
let products = {
    "商品A": { stock: 20, price: 50 },
    "商品B": { stock: 20, price: 30 },
    "商品C": { stock: 20, price: 80 }
};

let sales = [];
let records = [];
let currentCart = [];

function renderProducts() {
    let list = document.getElementById("productList");
    list.innerHTML = "";
    for(let p in products) {
        list.innerHTML += `
            <div class="card">
                <h3>${p}</h3>
                <p>庫存：${products[p].stock}</p>
                <p>單價：$${products[p].price}</p>
                <!-- -1 在左邊，+1 在右邊 -->
                <button class="action-btn" onclick="removeFromCart('${p}')">-1</button>
                <button class="action-btn" onclick="addToCart('${p}')">+1</button>
            </div>
        `;
    }
}

function addToCart(productName) {
    if (products[productName].stock <= 0) {
        alert("庫存不足");
        return;
    }
    currentCart.push({ product: productName, qty: 1, price: products[productName].price });
    updateCartDisplay();
}

function removeFromCart(productName) {
    let index = currentCart.findIndex(item => item.product === productName);
    if (index !== -1) {
        currentCart.splice(index, 1);
        updateCartDisplay();
    } else {
        alert("購物車裡沒有此商品");
    }
}

function updateCartDisplay() {
    let cartUl = document.getElementById("cart");
    let cartTotalSpan = document.getElementById("cartTotal");
    cartUl.innerHTML = "";
    let subtotal = 0;

    currentCart.forEach(item => {
        subtotal += item.qty * item.price;
        cartUl.innerHTML += `<li class="cart-item">${item.product} x ${item.qty} ($${item.price})</li>`;
    });
    cartTotalSpan.innerText = subtotal;
}

function checkout() {
    if (currentCart.length === 0) return;

    currentCart.forEach(item => {
        products[item.product].stock -= item.qty;
        sales.push(item);
    });

    let now = new Date().toLocaleString();
    let subtotal = currentCart.reduce((sum, item) => sum + item.qty * item.price, 0);
    let detail = currentCart.map(item => `${item.product} x ${item.qty}`).join(", ");
    records.push({ time: now, detail: detail, subtotal: subtotal });

    currentCart = [];
    updateCartDisplay();
    renderProducts();
    renderRecords();
    renderTotal();
}

function renderRecords() {
    let recordsTable = document.getElementById("records");
    recordsTable.innerHTML = "<tr><th>時間</th><th>品項明細</th><th>小計</th></tr>";
    records.forEach(r => {
        recordsTable.innerHTML += `<tr><td>${r.time}</td><td>${r.detail}</td><td>$${r.subtotal}</td></tr>`;
    });
}

function renderTotal() {
    let dailyTotal = 0;
    sales.forEach(s => {
        dailyTotal += s.qty * s.price;
    });
    document.getElementById("total").innerText = dailyTotal;
}

function clearData() {
    if (confirm("確定要刪除今日所有數據嗎？")) {
        products = {
            "商品A": { stock: 20, price: 50 },
            "商品B": { stock: 20, price: 30 },
            "商品C": { stock: 20, price: 80 }
        };
        sales = [];
        records = [];
        currentCart = [];
        updateCartDisplay();
        renderProducts();
        renderRecords();
        renderTotal();
    }
}

// 初始化畫面
renderProducts();
renderRecords();
renderTotal();
</script>

</body>
</html>
