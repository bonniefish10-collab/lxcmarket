<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>市集庫存</title>
    <style>
        body{ font-family:Arial; max-width:900px; margin:auto; background:#fff8dc; color:#5a4a00; padding:20px; }
        h1{ text-align:center; color:#c79a00; }
        h2{ color:#a67c00; margin-top:30px; }
        .products{ display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
        .card{ background:white; border:1px solid #f0d97a; border-radius:12px; padding:15px; width:200px; text-align:center; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
        .card h3{ margin:10px 0; color:#5a3e2b; }
        .card p{ margin:5px 0; color:#8b5e3c; font-weight:bold; }
        .card button{ background:#ffd84d; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; font-weight:bold; color:#5a4a00; }
        .card button:hover{ background:#ffcc00; }
        table{ border-collapse:collapse; width:100%; background:white; margin-top:10px; border-radius:12px; overflow:hidden; }
        td,th{ border:1px solid #f0d97a; padding:8px; text-align:center; }
        th{ background:#ffe680; }
    </style>
</head>
<body>

<h1>市集庫存</h1>

<h2>商品列表</h2>
<div class="products" id="productList"></div>

<h2>單筆待結帳數</h2>
<ul id="cart"></ul>
<p>本次小計：<span id="cartTotal">0</span></p>
<button onclick="checkout()">確認結算</button>

<h2>今日營業額</h2>
<p id="total" style="font-size:1.2em; font-weight:bold;">0</p>

<h2>登記紀錄</h2>
<table id="records">
    <tr><th>時間</th><th>商品</th><th>數量</th><th>單價</th><th>小計</th></tr>
</table>

<button onclick="clearData()">刪除今日所有數據</button>

<script>
// 初始化資料
let products = JSON.parse(localStorage.getItem("products")) || {
    "商品A": { stock: 20, price: 50 },
    "商品B": { stock: 20, price: 30 },
    "商品C": { stock: 20, price: 80 }
};

let sales = JSON.parse(localStorage.getItem("sales")) || [];
let records = JSON.parse(localStorage.getItem("records")) || [];
let currentCart = [];

function renderProducts() {
    let list = document.getElementById("productList");
    list.innerHTML = "";
    for(let p in products) {
        list.innerHTML += `
            <div class="card">
                <h3>${p}</h3>
                <p>庫存：${products[p].stock}</p>
                <p>單價：$${products[p].price}</p>
                <button onclick="addToCart('${p}')">+1</button>
            </div>
        `;
    }
}

function addToCart(productName) {
    if (products[productName].stock <= 0) {
        alert("庫存不足");
        return;
    }
    currentCart.push({ product: productName, qty: 1, price: products[productName].price });
    updateCartDisplay();
}

function updateCartDisplay() {
    let cartUl = document.getElementById("cart");
    let cartTotalSpan = document.getElementById("cartTotal");
    cartUl.innerHTML = "";
    let subtotal = 0;

    currentCart.forEach(item => {
        cartUl.innerHTML += `<li>${item.product} x ${item.qty} ($${item.price})</li>`;
        subtotal += item.qty * item.price;
    });
    cartTotalSpan.innerText = subtotal;
}

function checkout() {
    if (currentCart.length === 0) return;

    currentCart.forEach(item => {
        products[item.product].stock -= item.qty;
        sales.push(item);

        let now = new Date().toLocaleString();
        let subtotal = item.qty * item.price;
        records.push({ time: now, product: item.product, qty: item.qty, price: item.price, subtotal: subtotal });
    });

    // 存入 localStorage
    localStorage.setItem("products", JSON.stringify(products));
    localStorage.setItem("sales", JSON.stringify(sales));
    localStorage.setItem("records", JSON.stringify(records));

    currentCart = [];
    updateCartDisplay();
    renderProducts();
    renderRecords();
    renderTotal();
}

function renderRecords() {
    let recordsTable = document.getElementById("records");
    recordsTable.innerHTML = "<tr><th>時間</th><th>商品</th><th>數量</th><th>單價</th><th>小計</th></tr>";
    records.forEach(r => {
        recordsTable.innerHTML += `<tr><td>${r.time}</td><td>${r.product}</td><td>${r.qty}</td><td>$${r.price}</td><td>$${r.subtotal}</td></tr>`;
    });
}

function renderTotal() {
    let dailyTotal = 0;
    sales.forEach(s => {
        dailyTotal += s.qty * s.price;
    });
    document.getElementById("total").innerText = dailyTotal;
}

function clearData() {
    if (confirm("確定要刪除今日所有數據嗎？")) {
        localStorage.removeItem("products");
        localStorage.removeItem("sales");
        localStorage.removeItem("records");
        products = {
            "商品A": { stock: 20, price: 50 },
            "商品B": { stock: 20, price: 30 },
            "商品C": { stock: 20, price: 80 }
        };
        sales = [];
        records = [];
        currentCart = [];
        updateCartDisplay();
        renderProducts();
        renderRecords();
        renderTotal();
    }
}

// 初始化畫面
renderProducts();
renderRecords();
renderTotal();
</script>

</body>
</html>
