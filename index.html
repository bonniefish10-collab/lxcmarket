<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>庫存系統</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

:root{
    --base:#775537;
    --base-dk:#5c3f25;
    --base-lt:#9a7050;
    --tint1:#FBE29D;
    --tint2:#C0DDDA;
    --shell:#F4F1EE;
    --shell-dk:#e5e0d8;
    --white:#ffffff;
    --text:#3d2b18;
    --subtext:#8a6a4e;
}

body{
    font-family:'Noto Sans TC',sans-serif;
    background:var(--shell);
    color:var(--text);
    min-height:100vh;
}

/* HEADER */

header{
    background:var(--base);
    padding:14px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 2px 12px rgba(0,0,0,0.18);
}

header h1{
    font-family:'Cormorant Garamond',serif;
    font-size:1.4rem;
    color:var(--tint1);
}

.daily-total{
    color:rgba(255,255,255,0.7);
    font-size:.82rem;
}

.daily-total span{
    margin-left:4px;
    font-size:1.2rem;
    color:var(--tint1);
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
}

/* MOBILE */

.mobile-page{
    padding:16px;
    padding-bottom:170px;
}

.section-title{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    color:var(--base);
    margin-bottom:14px;
    font-size:1rem;
}

.products-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
}

.add-btn{
    border:none;
    background:var(--base);
    color:var(--tint1);
    padding:8px 14px;
    border-radius:999px;
    cursor:pointer;
    font-size:.8rem;
    font-weight:700;
}

/* PRODUCT GRID */

.product-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.product-card{
    position:relative;
    background:var(--white);
    border-radius:16px;
    padding:14px 10px;
    text-align:center;
    border:1px solid rgba(0,0,0,.08);
    box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.product-card h3{
    font-size:.9rem;
    margin-bottom:4px;
}

.price{
    color:var(--base);
    font-weight:700;
    margin-bottom:4px;
}

.stock{
    font-size:.75rem;
    color:var(--subtext);
    margin-bottom:8px;
}

.card-btns{
    display:flex;
    justify-content:center;
    gap:8px;
}

.qty-btn{
    width:34px;
    height:34px;
    border-radius:50%;
    border:none;
    background:var(--shell);
    font-size:1.1rem;
    cursor:pointer;
}

.delete-card-btn{
    position:absolute;
    top:8px;
    right:8px;
    border:none;
    background:none;
    cursor:pointer;
    color:#bbb;
}

/* FIXED CHECKOUT */

.checkout-bar{
    position:fixed;
    left:0;
    right:0;
    bottom:60px;
    background:var(--tint1);
    border-radius:18px 18px 0 0;
    box-shadow:0 -4px 18px rgba(0,0,0,.15);
    overflow:hidden;
}

.checkout-summary{
    padding:14px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
}

.checkout-total{
    font-family:'Cormorant Garamond',serif;
    font-size:1.3rem;
    color:var(--base);
    font-weight:600;
}

.checkout-detail{
    max-height:0;
    overflow:hidden;
    transition:max-height .3s ease;
}

.checkout-detail.open{
    max-height:400px;
}

.cart-list{
    list-style:none;
    padding:0 16px 12px;
}

.cart-list li{
    background:rgba(255,255,255,.6);
    margin-bottom:8px;
    border-radius:10px;
    padding:10px 12px;
    display:flex;
    justify-content:space-between;
}

.checkout-btn{
    width:calc(100% - 32px);
    margin:0 16px 16px;
    border:none;
    background:var(--base);
    color:var(--tint1);
    padding:14px;
    border-radius:999px;
    font-size:1rem;
    cursor:pointer;
}

/* TAB BAR */

.tab-bar{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    height:60px;
    background:var(--base);
    display:flex;
    z-index:50;
}

.tab-btn{
    flex:1;
    border:none;
    background:none;
    color:rgba(255,255,255,.5);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:.7rem;
    cursor:pointer;
}

.tab-btn.active{
    color:var(--tint1);
    background:rgba(255,255,255,.08);
}

/* OTHER PAGES */

.page{
    display:none;
    padding:16px;
    padding-bottom:90px;
    min-height:100vh;
}

.page.active{
    display:block;
}

.record-item{
    background:rgba(255,255,255,.7);
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
}

.notes-textarea{
    width:100%;
    height:300px;
    border:none;
    border-radius:14px;
    padding:14px;
    resize:none;
    font-size:.95rem;
}

/* MODAL */

.modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
}

.modal-overlay.active{
    display:flex;
}

.modal{
    width:90%;
    max-width:340px;
    background:white;
    border-radius:18px;
    padding:24px;
}

.modal h2{
    margin-bottom:18px;
    color:var(--base);
}

.modal input{
    width:100%;
    margin-bottom:12px;
    padding:12px;
    border-radius:10px;
    border:1px solid rgba(0,0,0,.12);
}

.modal-btns{
    display:flex;
    gap:10px;
}

.modal-btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.confirm{
    background:var(--base);
    color:var(--tint1);
}
</style>
</head>

<body>

<header>
    <h1>庫存系統</h1>
    <div class="daily-total">
        今日營業額
        <span id="total">$0</span>
    </div>
</header>

<!-- 商品頁 -->

<div class="mobile-page page active" id="products-page">

    <div class="products-header">
        <div class="section-title">商品列表</div>

        <button class="add-btn" onclick="openModal()">
            ＋ 新增品項
        </button>
    </div>

    <div class="product-grid" id="productList"></div>

</div>

<!-- 紀錄 -->

<div class="page" id="records-page">

    <div class="section-title">當日銷售紀錄</div>

    <div id="records"></div>

</div>

<!-- 記事 -->

<div class="page" id="notes-page">

    <div class="section-title">記事本</div>

    <textarea
        class="notes-textarea"
        id="notesArea"
        placeholder="在這裡記下備註…"
        oninput="saveNotes()"
    ></textarea>

</div>

<!-- FIXED CHECKOUT -->

<div class="checkout-bar">

    <div class="checkout-summary" onclick="toggleCheckout()">

        <div>結算</div>

        <div class="checkout-total" id="cartTotal">$0</div>

    </div>

    <div class="checkout-detail" id="checkoutDetail">

        <ul class="cart-list" id="cart"></ul>

        <button class="checkout-btn" onclick="checkout()">
            結帳
        </button>

    </div>

</div>

<!-- TAB BAR -->

<nav class="tab-bar">

    <button class="tab-btn active" onclick="showPage('products')" id="tab-products">
        <div>🛒</div>
        <span>商品</span>
    </button>

    <button class="tab-btn" onclick="showPage('records')" id="tab-records">
        <div>📋</div>
        <span>紀錄</span>
    </button>

    <button class="tab-btn" onclick="showPage('notes')" id="tab-notes">
        <div>📝</div>
        <span>記事</span>
    </button>

</nav>

<!-- MODAL -->

<div class="modal-overlay" id="modalOverlay">

    <div class="modal">

        <h2>新增品項</h2>

        <input type="text" id="newName" placeholder="商品名稱">

        <input type="number" id="newPrice" placeholder="價格">

        <input type="number" id="newStock" placeholder="庫存">

        <div class="modal-btns">

            <button class="modal-btn" onclick="closeModal()">
                取消
            </button>

            <button class="modal-btn confirm" onclick="addProduct()">
                新增
            </button>

        </div>

    </div>

</div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || {};
let sales = JSON.parse(localStorage.getItem('sales')) || [];
let records = JSON.parse(localStorage.getItem('records')) || [];
let currentCart = [];

document.getElementById('notesArea').value =
    localStorage.getItem('notes') || '';

function saveNotes(){
    localStorage.setItem(
        'notes',
        document.getElementById('notesArea').value
    );
}

/* PRODUCTS */

function renderProducts(){

    const list = document.getElementById('productList');

    list.innerHTML = '';

    for(let p in products){

        list.innerHTML += `
        <div class="product-card">

            <button class="delete-card-btn"
                onclick="deleteProduct('${p}')">
                ✕
            </button>

            <h3>${p}</h3>

            <div class="price">$${products[p].price}</div>

            <div class="stock">
                庫存 ${products[p].stock}
            </div>

            <div class="card-btns">

                <button class="qty-btn"
                    onclick="removeFromCart('${p}')">
                    −
                </button>

                <button class="qty-btn"
                    onclick="addToCart('${p}')">
                    ＋
                </button>

            </div>

        </div>
        `;
    }
}

function addToCart(p){

    if(products[p].stock <= 0){
        alert('庫存不足');
        return;
    }

    const idx = currentCart.findIndex(i => i.product === p);

    if(idx !== -1){
        currentCart[idx].qty++;
    }else{
        currentCart.push({
            product:p,
            qty:1,
            price:products[p].price
        });
    }

    updateCart();
}

function removeFromCart(p){

    const idx = currentCart.findIndex(i => i.product === p);

    if(idx !== -1){

        currentCart[idx].qty--;

        if(currentCart[idx].qty <= 0){
            currentCart.splice(idx,1);
        }

        updateCart();
    }
}

function updateCart(){

    const cart = document.getElementById('cart');

    cart.innerHTML = '';

    let total = 0;

    currentCart.forEach(item => {

        total += item.qty * item.price;

        cart.innerHTML += `
        <li>
            <span>${item.product} × ${item.qty}</span>
            <span>$${item.qty * item.price}</span>
        </li>
        `;
    });

    document.getElementById('cartTotal').innerText =
        '$' + total;
}

function checkout(){

    if(currentCart.length === 0) return;

    currentCart.forEach(item => {

        products[item.product].stock -= item.qty;

        sales.push(item);
    });

    const subtotal = currentCart.reduce(
        (s,i)=>s+i.qty*i.price,0
    );

    const detail = currentCart.map(
        i=>`${i.product}×${i.qty}`
    ).join('、');

    records.push({
        time:new Date().toLocaleTimeString(
            'zh-TW',
            {
                hour:'2-digit',
                minute:'2-digit'
            }
        ),
        detail,
        subtotal
    });

    localStorage.setItem('products',JSON.stringify(products));
    localStorage.setItem('sales',JSON.stringify(sales));
    localStorage.setItem('records',JSON.stringify(records));

    currentCart = [];

    updateCart();
    renderProducts();
    renderRecords();
    renderTotal();
}

/* RECORDS */

function renderRecords(){

    const el = document.getElementById('records');

    if(records.length === 0){

        el.innerHTML = '尚無紀錄';

        return;
    }

    el.innerHTML = '';

    [...records].reverse().forEach(r => {

        el.innerHTML += `
        <div class="record-item">

            <div>
                <div>${r.detail}</div>
                <small>${r.time}</small>
            </div>

            <div>$${r.subtotal}</div>

        </div>
        `;
    });
}

function renderTotal(){

    const total = sales.reduce(
        (s,i)=>s+i.qty*i.price,
        0
    );

    document.getElementById('total').innerText =
        '$' + total;
}

/* DELETE */

function deleteProduct(p){

    if(confirm(`確定刪除 ${p}？`)){

        delete products[p];

        localStorage.setItem(
            'products',
            JSON.stringify(products)
        );

        renderProducts();
    }
}

/* MODAL */

function openModal(){
    document.getElementById('modalOverlay')
        .classList.add('active');
}

function closeModal(){
    document.getElementById('modalOverlay')
        .classList.remove('active');
}

function addProduct(){

    const name = document.getElementById('newName').value.trim();

    const price = parseInt(
        document.getElementById('newPrice').value
    );

    const stock = parseInt(
        document.getElementById('newStock').value
    );

    if(!name || isNaN(price) || isNaN(stock)){

        alert('請填寫完整');

        return;
    }

    products[name] = {
        price,
        stock
    };

    localStorage.setItem(
        'products',
        JSON.stringify(products)
    );

    closeModal();

    renderProducts();
}

/* CHECKOUT */

function toggleCheckout(){

    document.getElementById('checkoutDetail')
        .classList.toggle('open');
}

/* TABS */

function showPage(name){

    ['products','records','notes'].forEach(p => {

        document.getElementById(
            p + '-page'
        ).classList.remove('active');

        document.getElementById(
            'tab-' + p
        ).classList.remove('active');
    });

    document.getElementById(
        name + '-page'
    ).classList.add('active');

    document.getElementById(
        'tab-' + name
    ).classList.add('active');
}

/* INIT */

renderProducts();
renderRecords();
renderTotal();
updateCart();
</script>

</body>
</html>
