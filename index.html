<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>市集庫存</title>
    <style>
        body{ font-family:Arial; max-width:900px; margin:auto; background:#fff8dc; color:#5a4a00; padding:20px; }
        h1{ text-align:center; color:#c79a00; }
        h2{ color:#a67c00; margin-top:30px; }
        .products{ display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
        .card{ background:white; border:1px solid #f0d97a; border-radius:12px; padding:15px; width:220px; text-align:center; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
        .card h3{ margin:10px 0; color:#5a3e2b; }
        .card p{ margin:5px 0; color:#8b5e3c; font-weight:bold; }
        .action-btn{ background:#ffd84d; border:none; padding:6px 10px; border-radius:6px; cursor:pointer; font-weight:bold; color:#5a4a00; margin:3px; }
        .action-btn:hover{ background:#ffcc00; }
        table{ border-collapse:collapse; width:100%; background:white; margin-top:10px; border-radius:12px; overflow:hidden; }
        td,th{ border:1px solid #f0d97a; padding:8px; text-align:center; }
        th{ background:#ffe680; }
        #topTotal{ font-size:1.4em; font-weight:bold; text-align:center; margin-bottom:20px; }
        .cart-item{ margin:5px 0; }
        .checkout-section { display:flex; align-items:stretch; gap:20px; }
        .checkout-left { flex:1; background:#fff8dc; padding:10px; border:1px solid #f0d97a; border-radius:8px; }
        .checkout-right { flex:0 0 200px; display:flex; justify-content:center; align-items:center; background:#fff8dc; border:1px solid #f0d97a; border-radius:8px; }
        .checkout-right img { max-width:100%; max-height:100%; }
    </style>
</head>
<body>

<div id="topTotal">今日營業額：<span id="total">0</span></div>

<h1>市集庫存</h1>

<h2>商品列表</h2>
<div class="products" id="productList"></div>

<h2>新增商品</h2>
<div>
    <input type="text" id="newName" placeholder="商品名稱">
    <input type="number" id="newStock" placeholder="庫存" value="10">
    <input type="number" id="newPrice" placeholder="單價" value="50">
    <button class="action-btn" onclick="addProduct()">新增</button>
</div>

<h2>單筆待結帳數</h2>
<div class="checkout-section">
    <div class="checkout-left">
        <ul id="cart"></ul>
        <p>本次小計：<span id="cartTotal">0</span></p>
        <button class="action-btn" onclick="checkout()">確認結算</button>
    </div>
    <div class="checkout-right">
         <img src="https://preview.redd.it/seeking-the-original-creator-of-this-bread-gif-v0-fqoz0d9ypfpg1.gif?width=498&auto=webp&s=96853f4089a08b9dbe13ad79217cd1752dddfc35" alt="GIF">
    </div>
</div>

<h2>登記紀錄</h2>
<table id="records">
    <tr><th>時間</th><th>品項明細</th><th>小計</th></tr>
</table>

<button class="action-btn" onclick="clearData()">刪除今日所有數據</button>

<script>
let products = JSON.parse(localStorage.getItem("products")) || {
    "商品A": { stock: 20, price: 50 },
    "商品B": { stock: 20, price: 30 },
    "商品C": { stock: 20, price: 80 }
};
let sales = JSON.parse(localStorage.getItem("sales")) || [];
let records = JSON.parse(localStorage.getItem("records")) || [];
let currentCart = [];

function renderProducts() {
    let list = document.getElementById("productList");
    list.innerHTML = "";
    for(let p in products) {
        list.innerHTML += `
            <div class="card">
                <h3>${p}</h3>
                <p>庫存：${products[p].stock}</p>
                <p>單價：$${products[p].price}</p>
                <button class="action-btn" onclick="removeFromCart('${p}')">-1</button>
                <button class="action-btn" onclick="addToCart('${p}')">+1</button>
                <div style="margin-top:10px;">
                    <input type="number" id="stock_${p}" value="${products[p].stock}" style="width:60px;">
                    <input type="number" id="price_${p}" value="${products[p].price}" style="width:60px;">
                    <button class="action-btn" onclick="updateProduct('${p}')">更新</button>
                    <button class="action-btn" onclick="deleteProduct('${p}')">刪除</button>
                </div>
            </div>
        `;
    }
}

function addProduct() {
    let name = document.getElementById("newName").value.trim();
    let stock = parseInt(document.getElementById("newStock").value);
    let price = parseInt(document.getElementById("newPrice").value);

    if (!name) { alert("請輸入商品名稱"); return; }
    if (products[name]) { alert("商品已存在"); return; }
    if (isNaN(stock) || isNaN(price) || stock < 0 || price < 0) { alert("請輸入有效數字"); return; }

    products[name] = { stock: stock, price: price };
    localStorage.setItem("products", JSON.stringify(products));
    renderProducts();
}

function updateProduct(productName) {
    let newStock = parseInt(document.getElementById("stock_" + productName).value);
    let newPrice = parseInt(document.getElementById("price_" + productName).value);

    if (isNaN(newStock) || isNaN(newPrice) || newStock < 0 || newPrice < 0) {
        alert("請輸入有效數字");
        return;
    }

    products[productName].stock = newStock;
    products[productName].price = newPrice;
    localStorage.setItem("products", JSON.stringify(products));
    renderProducts();
}

function deleteProduct(productName) {
    if (confirm("確定要刪除 " + productName + " 嗎？")) {
        delete products[productName];
        localStorage.setItem("products", JSON.stringify(products));
        renderProducts();
    }
}

function addToCart(productName) {
    if (products[productName].stock <= 0) { alert("庫存不足"); return; }
    currentCart.push({ product: productName, qty: 1, price: products[productName].price });
    updateCartDisplay();
}

function removeFromCart(productName) {
    let index = currentCart.findIndex(item => item.product === productName);
    if (index !== -1) { currentCart.splice(index, 1); updateCartDisplay(); }
    else { alert("購物車裡沒有此商品"); }
}

function updateCartDisplay() {
    let cartUl = document.getElementById("cart");
    let cartTotalSpan = document.getElementById("cartTotal");
    cartUl.innerHTML = "";
    let subtotal = 0;
    currentCart.forEach(item => {
        subtotal += item.qty * item.price;
        cartUl.innerHTML += `<li class="cart-item">${item.product} x ${item.qty} ($${item.price})</li>`;
    });
    cartTotalSpan.innerText = subtotal;
}

function checkout() {
    if (currentCart.length === 0) return;
    currentCart.forEach(item => {
        products[item.product].stock -= item.qty;
        sales.push(item);
    });
    let now = new Date().toLocaleString();
    let subtotal = currentCart.reduce((sum, item) => sum + item.qty * item.price, 0);
    let detail = currentCart.map(item => `${item.product} x ${item.qty}`).join(", ");
    records.push({ time: now, detail: detail, subtotal: subtotal });
